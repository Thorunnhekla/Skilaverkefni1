<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hafa samband</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: "Quicksand";
        background-color: #f3ece3;
        text-align: center;
      }

      form {
        background-color: #c8a19c;
        padding: 20px;
        border-radius: 15px;
        width: 300px;
        margin: 30px auto;
      }

      input,
      textarea {
        width: 90%;
        padding: 8px;
        margin: 5px;
      }

      button {
        background-color: #91766e;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <h1>Hafðu samband 💌</h1>
    <p>Netfangið mitt: thorunnhekla@icloud.com</p>
    <form>
      <input type="text" placeholder="Nafn" />
      <br />
      <input type="email" placeholder="Netfang" />
      <br />
      <textarea placeholder="Skilaboð"></textarea>
      <br />
      <button>Senda</button>
    </form>
  </body>
</html>
